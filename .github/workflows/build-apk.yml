        game/Assets/Plugins/Android/ZeyWinLegacyRes.androidlib\"\nif [ -d \"$legacy_res\"\
        \ ]; then\n  echo \"Moving obsolete Android resources into Android Library\
        \ after SDK prep: $androidlib\"\n  mkdir -p \"$androidlib/src/main\"\n  rm\
        \ -rf \"$androidlib/src/main/res\"\n  mv \"$legacy_res\" \"$androidlib/src/main/res\"\
        \n  cat > \"$androidlib/AndroidManifest.xml\" <<'XML'\n<manifest xmlns:android=\"\
        http://schemas.android.com/apk/res/android\" package=\"com.zeywin.legacyres\"\
        \ />\nXML\n  cat > \"$androidlib/build.gradle\" <<'GRADLE'\nplugins {\n  \
        \  id 'com.android.library'\n}\n\nandroid {\n    compileSdk 34\n    namespace\
        \ 'com.zeywin.legacyres'\n}\nGRADLE\n  find \"$androidlib\" -maxdepth 4 -type\
