    - name: Install Unity Android legacy resource preprocessor
      shell: bash
      run: "set -euo pipefail\nmkdir -p game/Assets/Editor\ncat > game/Assets/Editor/ZeyWinAndroidLegacyResourcePreprocessor.cs\
        \ <<'CS'\nusing System.IO;\nusing UnityEditor;\nusing UnityEditor.Build;\n\
        using UnityEditor.Build.Reporting;\n\npublic sealed class ZeyWinAndroidLegacyResourcePreprocessor\
        \ : IPreprocessBuildWithReport\n{\n    public int callbackOrder => 200000;\n\
        \n    public void OnPreprocessBuild(BuildReport report)\n    {\n        if\
        \ (report.summary.platform != BuildTarget.Android)\n            return;\n\n\
        \        var legacy = \"Assets/Plugins/Android/res\";\n        if (!Directory.Exists(legacy))\n\
        \        {\n            UnityEngine.Debug.Log(\"[ZeyWinActions] No obsolete\
        \ Android resources in Assets/Plugins/Android/res during Unity prebuild.\"\
        );\n            return;\n        }\n\n        var androidLib = \"Assets/Plugins/Android/ZeyWinLegacyRes.androidlib\"\
        ;\n        var target = Path.Combine(androidLib, \"src/main/res\");\n    \
        \    if (Directory.Exists(target))\n            Directory.Delete(target, true);\n\
        \n        Directory.CreateDirectory(Path.GetDirectoryName(target));\n    \
        \    Directory.Move(legacy, target);\n        File.WriteAllText(Path.Combine(androidLib,\
        \ \"AndroidManifest.xml\"), \"<manifest xmlns:android=\\\"http://schemas.android.com/apk/res/android\\\
        \" package=\\\"com.zeywin.legacyres\\\" />\");\n        File.WriteAllText(Path.Combine(androidLib,\
        \ \"build.gradle\"), \"plugins {\\n    id 'com.android.library'\\n}\\n\\nandroid\
        \ {\\n    compileSdk 34\\n    namespace 'com.zeywin.legacyres'\\n}\\n\");\n\
        \n        FileUtil.DeleteFileOrDirectory(legacy);\n        FileUtil.DeleteFileOrDirectory(legacy\
        \ + \".meta\");\n        if (Directory.Exists(legacy))\n            Directory.Delete(legacy,\
        \ true);\n        if (File.Exists(legacy + \".meta\"))\n            File.Delete(legacy\
        \ + \".meta\");\n\n        AssetDatabase.Refresh(ImportAssetOptions.ForceUpdate);\n\
        \        if (Directory.Exists(legacy))\n            throw new System.Exception(\"\
        [ZeyWinActions] Obsolete Android resources folder still exists after cleanup:\
        \ \" + legacy);\n\n        UnityEngine.Debug.Log(\"[ZeyWinActions] Moved obsolete\
        \ Android resources into Android Library and removed legacy folder during\
        \ Unity prebuild: \" + androidLib);\n    }\n}\nCS\n"
