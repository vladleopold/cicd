        ADMOB_ANDROID_INTERSTITIAL_ID: ${{ inputs.admob_android_interstitial_id ||
          secrets.ADMOB_ANDROID_INTERSTITIAL_ID }}
        ADMOB_ANDROID_REWARDED_ID: ${{ inputs.admob_android_rewarded_id || secrets.ADMOB_ANDROID_REWARDED_ID
          }}
        ADMOB_ANDROID_REWARDED_INTERSTITIAL_ID: ${{ inputs.admob_android_rewarded_interstitial_id
          || secrets.ADMOB_ANDROID_REWARDED_INTERSTITIAL_ID }}
        ADMOB_ANDROID_NATIVE_ID: ${{ inputs.admob_android_native_id || secrets.ADMOB_ANDROID_NATIVE_ID
          }}
        ADMOB_ANDROID_APP_OPEN_ID: ${{ inputs.admob_android_app_open_id || secrets.ADMOB_ANDROID_APP_OPEN_ID
          }}
        APK_OUTPUT_PATH: ${{ steps.resolve_version.outputs.apk_output_path }}
        AAB_OUTPUT_PATH: ${{ steps.resolve_version.outputs.aab_output_path }}
      with:
        unityVersion: 6000.0.71f1
        targetPlatform: Android
        projectPath: game
        versioning: None
        buildMethod: BuildGithubActionsApk.BuildAndroidAppBundle
        customParameters: -logFile - -apkOutputPath "${{ steps.resolve_version.outputs.apk_output_path
          }}" -aabOutputPath "${{ steps.resolve_version.outputs.aab_output_path }}"
          -androidPackageName "${{ inputs.package_name }}" -androidVersionName "${{
          steps.resolve_version.outputs.version_name }}" -androidVersionCode "${{
          steps.resolve_version.outputs.version_code }}" -androidKeystorePath "/github/workspace/.ci/keystore/user.keystore"
          -zeywinApiKey "${{ inputs.zeywin_api_key || secrets.ZEYWIN_API_KEY }}" -admobAndroidAppId
          "${{ inputs.admob_android_app_id || secrets.ADMOB_ANDROID_APP_ID }}" -admobAndroidBannerId
          "${{ inputs.admob_android_banner_id || secrets.ADMOB_ANDROID_BANNER_ID }}"
          -admobAndroidInterstitialId "${{ inputs.admob_android_interstitial_id ||
          secrets.ADMOB_ANDROID_INTERSTITIAL_ID }}" -admobAndroidRewardedId "${{ inputs.admob_android_rewarded_id
          || secrets.ADMOB_ANDROID_REWARDED_ID }}" -admobAndroidRewardedInterstitialId
          "${{ inputs.admob_android_rewarded_interstitial_id || secrets.ADMOB_ANDROID_REWARDED_INTERSTITIAL_ID
          }}" -admobAndroidNativeId "${{ inputs.admob_android_native_id || secrets.ADMOB_ANDROID_NATIVE_ID
          }}" -admobAndroidAppOpenId "${{ inputs.admob_android_app_open_id || secrets.ADMOB_ANDROID_APP_OPEN_ID
          }}"
    - name: Upload Unity build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: unity-build-log
        path: 'build/unity-build.log

          game/build/unity-build.log

          '
        if-no-files-found: ignore
    - name: Verify Android build output
      shell: bash
      env:
        BUILD_FORMAT: ${{ inputs.build_format }}
        APK_OUTPUT_PATH: ${{ steps.resolve_version.outputs.apk_output_path }}
        AAB_OUTPUT_PATH: ${{ steps.resolve_version.outputs.aab_output_path }}
      run: "set -euo pipefail\nsudo chown -R \"$USER:$USER\" build Builds game/build\
        \ game/Builds game/Library/Bee/Android 2>/dev/null || true\nmkdir -p \"$(dirname\
        \ \"$APK_OUTPUT_PATH\")\" \"$(dirname \"$AAB_OUTPUT_PATH\")\"\n\nverify_one()\
        \ {\n  local output_path=\"$1\"\n  local ext=\"$2\"\n\n  if [ ! -f \"$output_path\"\
        \ ]; then\n    echo \"Android $ext was not created at expected path: $output_path\"\
        \n    echo \"Searching for .$ext files in Unity output folders...\"\n    found_output=\"\
        $(find build/android Builds game/build game/Builds game/Library/Bee/Android\
        \ -type f -name \"*.$ext\" -print 2>/dev/null | head -n 1 || true)\"\n   \
        \ if [ -n \"$found_output\" ]; then\n      echo \"Found .$ext at $found_output\"\
        \n      cp \"$found_output\" \"$output_path\"\n    fi\n  fi\n\n  if [ ! -f\
        \ \"$output_path\" ]; then\n    echo \"Android $ext was not created and no\
        \ fallback .$ext was found.\"\n    echo \"----- android package files -----\"\
        \n    find . -type f \\( -name '*.apk' -o -name '*.aab' \\) -print || true\n\
        \    echo \"----- build files -----\"\n    find build Builds game/build game/Builds\
        \ game/Library/Bee/Android -maxdepth 8 -type f -print 2>/dev/null || true\n\
        \    echo \"----- important Unity log lines from console log -----\"\n   \
        \ if [ -f build/unity-build.log ]; then\n      grep -E \"ZeyWinActions|Build\
        \ result|error CS|Script Compilation Error|Exception|Android build failed\"\
        \ build/unity-build.log || true\n    elif [ -f game/build/unity-build.log\
        \ ]; then\n      grep -E \"ZeyWinActions|Build result|error CS|Script Compilation\
        \ Error|Exception|Android build failed\" game/build/unity-build.log || true\n\
        \    else\n      echo \"Unity log file was not written because Unity logs\
        \ are streamed to the GitHub Actions console.\"\n    fi\n    exit 1\n  fi\n\
        \n  ls -lh \"$output_path\"\n}\n\nif [ \"$BUILD_FORMAT\" = \"aab\" ]; then\n\
        \  verify_one \"$AAB_OUTPUT_PATH\" \"aab\"\nelif [ \"$BUILD_FORMAT\" = \"\
        apk_aab\" ]; then\n  verify_one \"$APK_OUTPUT_PATH\" \"apk\"\n  verify_one\
        \ \"$AAB_OUTPUT_PATH\" \"aab\"\nelse\n  verify_one \"$APK_OUTPUT_PATH\" \"\
        apk\"\nfi\n"
    - name: Sign Android App Bundle
      if: ${{ inputs.build_format == 'aab' || inputs.build_format == 'apk_aab' }}
      shell: bash
      env:
        AAB_OUTPUT_PATH: ${{ steps.resolve_version.outputs.aab_output_path }}
      run: "set -euo pipefail\ntest -f \"$AAB_OUTPUT_PATH\" || { echo \"AAB not found\
        \ before signing: $AAB_OUTPUT_PATH\"; exit 1; }\ntest -n \"$ANDROID_KEYSTORE_PASS\"\
        \ || { echo \"ANDROID_KEYSTORE_PASS secret is empty.\"; exit 1; }\n\nalias_name=\"\
        ${ANDROID_KEYALIAS_NAME:-social casino}\"\nalias_pass=\"${ANDROID_KEYALIAS_PASS:-$ANDROID_KEYSTORE_PASS}\"\
        \nunsigned_path=\"/tmp/$(basename \"${AAB_OUTPUT_PATH%.aab}\")-unsigned.aab\"\
        \ncp \"$AAB_OUTPUT_PATH\" \"$unsigned_path\"\n\njarsigner \\\n  -sigalg SHA256withRSA\
        \ \\\n  -digestalg SHA-256 \\\n  -keystore \"$GITHUB_WORKSPACE/.ci/keystore/user.keystore\"\
        \ \\\n  -storepass \"$ANDROID_KEYSTORE_PASS\" \\\n  -keypass \"$alias_pass\"\
        \ \\\n  \"$AAB_OUTPUT_PATH\" \\\n  \"$alias_name\"\n\njarsigner -verify -verbose\
        \ -certs \"$AAB_OUTPUT_PATH\" | tee /tmp/aab-signature-verify.txt\nif grep\
        \ -q \"jar is unsigned\" /tmp/aab-signature-verify.txt; then\n  echo \"AAB\
        \ is still unsigned after jarsigner.\"\n  exit 1\nfi\n"
    - name: Prepare Google Play release notes
      if: ${{ inputs.publish_to_google_play == 'true' }}
      shell: bash
      env:
        VERSION_NAME: ${{ steps.resolve_version.outputs.version_name }}
      run: 'set -euo pipefail

        mkdir -p whatsnew

        printf ''Bug fixes and SDK updates for version %s.\n'' "$VERSION_NAME" > whatsnew/whatsnew-en-US

        '
    - name: Check Google Play API access
      id: google_play_access
      if: ${{ inputs.publish_to_google_play == 'true' }}
      continue-on-error: true
      working-directory: google-play-connect
      env:
        PACKAGE_NAME: ${{ inputs.package_name }}
        GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON
          }}
      run: node scripts/check-play-access.mjs
    - name: Upload AAB to Google Play
      if: ${{ inputs.publish_to_google_play == 'true' && steps.google_play_access.outcome
        == 'success' }}
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON
          }}
        packageName: ${{ inputs.package_name }}
        releaseFiles: ${{ steps.resolve_version.outputs.aab_output_path }}
        track: ${{ inputs.google_play_track }}
        status: ${{ inputs.google_play_status }}
        releaseName: ${{ steps.resolve_version.outputs.version_name }}
        whatsNewDirectory: whatsnew
    - name: Upload Android package
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.build_format == 'apk_aab' && 'APK_AAB' || (inputs.build_format
          == 'aab' && 'AAB' || 'APK') }}_${{ inputs.package_name }}_v${{ steps.resolve_version.outputs.version_code
          }}
        path: 'build/android/*.apk

          build/android/*.aab

          '
        if-no-files-found: error
    - name: Publish Android package release and metadata
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        BUILD_FORMAT: ${{ inputs.build_format }}
        PACKAGE_NAME: ${{ inputs.package_name }}
        VERSION_NAME: ${{ steps.resolve_version.outputs.version_name }}
        VERSION_CODE: ${{ steps.resolve_version.outputs.version_code }}
        APK_OUTPUT_PATH: ${{ steps.resolve_version.outputs.apk_output_path }}
        AAB_OUTPUT_PATH: ${{ steps.resolve_version.outputs.aab_output_path }}
        PUBLISH_TO_GOOGLE_PLAY: ${{ inputs.publish_to_google_play }}
        GOOGLE_PLAY_TRACK: ${{ inputs.google_play_track }}
        GOOGLE_PLAY_STATUS: ${{ inputs.google_play_status }}
        GOOGLE_PLAY_API_ACCESS: ${{ steps.google_play_access.outcome || 'skipped'
          }}
        REQUIRE_GOOGLE_PLAY_UPLOAD: ${{ inputs.require_google_play_upload }}
      run: "set -euo pipefail\npackage_paths=()\nif [ \"$BUILD_FORMAT\" = \"aab\"\
        \ ]; then\n  package_paths+=(\"$AAB_OUTPUT_PATH\")\nelif [ \"$BUILD_FORMAT\"\
        \ = \"apk_aab\" ]; then\n  package_paths+=(\"$APK_OUTPUT_PATH\" \"$AAB_OUTPUT_PATH\"\
        )\nelse\n  package_paths+=(\"$APK_OUTPUT_PATH\")\nfi\n\nfor package_path in\
        \ \"${package_paths[@]}\"; do\n  if [ ! -f \"$package_path\" ]; then\n   \
        \ echo \"Expected Android package is missing before release publish: $package_path\"\
        \n    exit 1\n  fi\ndone\n\nversion_dir=\"builds/$PACKAGE_NAME/v$VERSION_CODE\"\
        \nlatest_dir=\"builds/$PACKAGE_NAME\"\nmkdir -p \"$version_dir\" \"$latest_dir\"\
        \nrelease_tag=\"android-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}\"\nrelease_url=\"\
        https://github.com/$GITHUB_REPOSITORY/releases/tag/$release_tag\"\nrelease_assets=()\n\
        for package_path in \"${package_paths[@]}\"; do\n  package_name=\"$(basename\
        \ \"$package_path\")\"\n  release_assets+=(\"$package_path#$package_name\"\
        )\ndone\n\ngh release create \"$release_tag\" \"${release_assets[@]}\" \\\n\
        \  --repo \"$GITHUB_REPOSITORY\" \\\n  --title \"${BUILD_FORMAT^^} $PACKAGE_NAME\
        \ v$VERSION_CODE\" \\\n  --notes \"${BUILD_FORMAT^^} built by GitHub Actions\
        \ run $GITHUB_RUN_NUMBER attempt $GITHUB_RUN_ATTEMPT.\"\n\ngit fetch origin\
        \ \"$GITHUB_REF_NAME\"\ngit reset --hard \"origin/$GITHUB_REF_NAME\"\nmkdir\
        \ -p \"$version_dir\" \"$latest_dir\"\npackage_repo_paths=()\napk_asset=\"\
        \"\napk_path=\"\"\naab_asset=\"\"\naab_path=\"\"\n\nfor package_path in \"\
        ${package_paths[@]}\"; do\n  package_name=\"$(basename \"$package_path\")\"\
        \n  package_ext=\"${package_name##*.}\"\n  package_size=\"$(wc -c < \"$package_path\"\
        )\"\n  if [ \"$package_size\" -lt 90000000 ]; then\n    cp \"$package_path\"\
        \ \"$version_dir/$package_name\"\n    package_repo_path=\"$version_dir/$package_name\"\
        \n  else\n    package_repo_path=\"$version_dir/$package_name.url\"\n    printf\
        \ '%s\\n' \"$release_url\" > \"$package_repo_path\"\n  fi\n  shasum -a 256\
        \ \"$package_path\" | sed \"s#  .*#  $package_name#\" > \"$version_dir/$package_name.sha256\"\
        \n  package_repo_paths+=(\"$package_repo_path\" \"$version_dir/$package_name.sha256\"\
        )\n\n  if [ \"$package_ext\" = \"apk\" ]; then\n    apk_asset=\"$package_name\"\
        \n    apk_path=\"$package_repo_path\"\n  elif [ \"$package_ext\" = \"aab\"\
        \ ]; then\n    aab_asset=\"$package_name\"\n    aab_path=\"$package_repo_path\"\
        \n  fi\ndone\n\npackage_repo_path=\"${apk_path:-$aab_path}\"\n\n{\n  echo\
        \ \"run_id=$GITHUB_RUN_ID\"\n  echo \"run_number=$GITHUB_RUN_NUMBER\"\n  echo\
        \ \"run_attempt=$GITHUB_RUN_ATTEMPT\"\n  echo \"commit_sha=$GITHUB_SHA\"\n\
        \  echo \"ref=$GITHUB_REF_NAME\"\n  echo \"package_name=$PACKAGE_NAME\"\n\
        \  echo \"version_name=$VERSION_NAME\"\n  echo \"version_code=$VERSION_CODE\"\
        \n  echo \"build_format=$BUILD_FORMAT\"\n  echo \"apk_artifact=${BUILD_FORMAT^^}_${PACKAGE_NAME}_v${VERSION_CODE}\"\
        \n  echo \"apk_release=$release_url\"\n  if [ -n \"$apk_asset\" ]; then\n\
        \    echo \"apk_asset=$apk_asset\"\n    echo \"apk_path=$apk_path\"\n  fi\n\
        \  if [ -n \"$aab_asset\" ]; then\n    echo \"aab_asset=$aab_asset\"\n   \
        \ echo \"aab_path=$aab_path\"\n  fi\n  echo \"package_repo_path=$package_repo_path\"\
        \n  echo \"built_at_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')\"\n  echo \"run_url=https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"\
        \n  if [ \"$PUBLISH_TO_GOOGLE_PLAY\" = \"true\" ]; then\n    echo \"google_play_track=$GOOGLE_PLAY_TRACK\"\
        \n    echo \"google_play_status=$GOOGLE_PLAY_STATUS\"\n    echo \"google_play_api_access=$GOOGLE_PLAY_API_ACCESS\"\
        \n    echo \"require_google_play_upload=$REQUIRE_GOOGLE_PLAY_UPLOAD\"\n  \
        \  if [ \"$GOOGLE_PLAY_API_ACCESS\" = \"success\" ]; then\n      echo \"google_play_upload=api\"\
        \n    else\n      echo \"google_play_upload=ui_fallback_required\"\n    fi\n\
        \  fi\n} > \"$version_dir/build.txt\"\n\nif [ \"$PUBLISH_TO_GOOGLE_PLAY\"\
        \ = \"true\" ] && [ \"$GOOGLE_PLAY_API_ACCESS\" != \"success\" ]; then\n \
        \ {\n    echo \"# Google Play UI Upload Fallback\"\n    echo\n    echo \"\
        The AAB was built successfully, but Google Play API access was not available\
        \ for the service account.\"\n    echo \"Upload this package through the Google\
        \ Play Console web interface from a logged-in browser.\"\n    echo\n    echo\
        \ \"| Field | Value |\"\n    echo \"| --- | --- |\"\n    echo \"| Package\
        \ | \\`$PACKAGE_NAME\\` |\"\n    echo \"| Version name | \\`$VERSION_NAME\\\
        ` |\"\n    echo \"| Version code | \\`$VERSION_CODE\\` |\"\n    echo \"| Track\
        \ | \\`$GOOGLE_PLAY_TRACK\\` |\"\n    echo \"| Release status | \\`$GOOGLE_PLAY_STATUS\\\
        ` |\"\n    echo \"| File | \\`$package_repo_path\\` |\"\n    echo \"| GitHub\
        \ release | $release_url |\"\n    echo\n    echo \"## Steps\"\n    echo\n\
        \    echo \"1. Open the app in Google Play Console.\"\n    echo \"2. Open\
        \ the release track: \\`$GOOGLE_PLAY_TRACK\\`.\"\n    echo \"3. Create a new\
        \ release or edit the draft release.\"\n    echo \"4. Upload the AAB from\
        \ this build.\"\n    echo \"5. Use release name \\`$VERSION_NAME\\` and release\
        \ notes from \\`whatsnew/whatsnew-en-US\\`.\"\n    echo \"6. Save, review,\
        \ and send the release according to the selected status.\"\n    echo\n   \
        \ echo \"Service account that still needs Play Console permissions:\"\n  \
        \  echo\n    echo \"\\`zeywin-play-publisher@zeywin-connect.iam.gserviceaccount.com\\\
        `\"\n  } > \"$version_dir/google-play-ui-upload.md\"\nfi\n\ncurrent_latest_code=\"\
        $(sed -n 's/^version_code=//p' \"$latest_dir/latest-build.txt\" 2>/dev/null\
        \ | tail -n 1 || true)\"\nif ! [[ \"$current_latest_code\" =~ ^[0-9]+$ ]];\
        \ then\n  current_latest_code=0\nfi\n\nlatest_files=(\"$version_dir/build.txt\"\
        )\nif [ -f \"$version_dir/google-play-ui-upload.md\" ]; then\n  latest_files+=(\"\
        $version_dir/google-play-ui-upload.md\")\nfi\nif [ \"$VERSION_CODE\" -ge \"\
        $current_latest_code\" ]; then\n  cp \"$version_dir/build.txt\" \"$latest_dir/latest-build.txt\"\
        \n  latest_files+=(\"$latest_dir/latest-build.txt\")\nelse\n  echo \"Built\
        \ old version code $VERSION_CODE. Keeping latest-build.txt at version code\
        \ $current_latest_code.\"\nfi\n\n{\n  echo \"# Latest APK Builds\"\n  echo\n\
        \  echo \"Use this table before workflow runs. For a new release, use the\
        \ next manual values. For an old-version rebuild, enter the old version manually.\"\
        \n  echo\n  echo \"| Package | Latest version name | Latest version code |\
        \ Next manual version name | Next manual version code | APK |\"\n  echo \"\
        | --- | --- | ---: | --- | ---: | --- |\"\n  while IFS= read -r latest_file;\
        \ do\n    pkg=\"$(sed -n 's/^package_name=//p' \"$latest_file\" | tail -n\
        \ 1)\"\n    name=\"$(sed -n 's/^version_name=//p' \"$latest_file\" | tail\
        \ -n 1)\"\n    code=\"$(sed -n 's/^version_code=//p' \"$latest_file\" | tail\
        \ -n 1)\"\n    path=\"$(sed -n 's/^package_repo_path=//p' \"$latest_file\"\
        \ | tail -n 1)\"\n    if [ -z \"$path\" ]; then\n      path=\"$(sed -n 's/^apk_path=//p'\
        \ \"$latest_file\" | tail -n 1)\"\n    fi\n    if [[ \"$code\" =~ ^[0-9]+$\
        \ ]]; then\n      next_code=$((code + 1))\n    else\n      next_code=1\n \
        \   fi\n    echo \"| \\`$pkg\\` | \\`$name\\` | \\`$code\\` | \\`1.0.$next_code\\\
        ` | \\`$next_code\\` | [$path]($path) |\"\n  done < <(find builds -mindepth\
        \ 2 -maxdepth 2 -name latest-build.txt -type f | sort)\n} > builds/index.md\n\
        \ngit config user.name \"github-actions[bot]\"\ngit config user.email \"41898282+github-actions[bot]@users.noreply.github.com\"\
        \ngit add -f \"${package_repo_paths[@]}\" \"${latest_files[@]}\" builds/index.md\n\
        \nif git diff --cached --quiet; then\n  echo \"APK metadata in repository\
        \ is already up to date: builds/latest-build.txt\"\n  exit 0\nfi\n\ngit commit\
        \ -m \"Record Android package from GitHub Actions run $GITHUB_RUN_NUMBER\"\
        \nif ! git pull --rebase --autostash origin \"$GITHUB_REF_NAME\"; then\n \
        \ echo \"Metadata rebase failed after APK release upload. APK is already available\
        \ in the release: $release_url\"\n  exit 0\nfi\n\nif ! git push origin \"\
        HEAD:$GITHUB_REF_NAME\"; then\n  echo \"Metadata push failed after APK release\
        \ upload. APK is already available in the release: $release_url\"\n  exit\
        \ 0\nfi\n"
    - name: Require Google Play upload
      if: ${{ inputs.publish_to_google_play == 'true' && inputs.require_google_play_upload
        == 'true' && steps.google_play_access.outcome != 'success' }}
      shell: bash
      run: 'echo "Google Play upload was requested, but API access failed. The AAB
        was built and saved, but it was not uploaded to Google Play."

        echo "Grant the service account Play Console release permissions, then rerun
        with build_format=aab and publish_to_google_play=true."

        exit 1

        '
