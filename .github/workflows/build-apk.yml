    - name: Disable Git LFS for game repository
      shell: bash
      run: "set -euo pipefail\necho \"Disabling Git LFS to avoid Curl error 42...\"\
        \n\n# Создаем .lfsconfig в игровом репозитории\ncat > game/.lfsconfig <<'EOF'\n\
        [lfs]\n\tfetchinclude =\n\tfetchexclude = *\nEOF\n\n# Удаляем .gitattributes\
        \ если есть\nif [ -f game/.gitattributes ]; then\n  rm -f game/.gitattributes\n\
        \  echo \"Removed game/.gitattributes\"\nfi\n\necho \"✅ Git LFS disabled for\
        \ game repository\"\n"
    - name: Normalize legacy Android resources
      shell: bash
      run: "set -euo pipefail\nlegacy_res=\"game/Assets/Plugins/Android/res\"\nandroidlib=\"\
        game/Assets/Plugins/Android/ZeyWinLegacyRes.androidlib\"\nif [ -d \"$legacy_res\"\
        \ ]; then\n  echo \"Moving obsolete Android resources into Android Library:\
        \ $androidlib\"\n  mkdir -p \"$androidlib/src/main\"\n  rm -rf \"$androidlib/src/main/res\"\
        \n  mv \"$legacy_res\" \"$androidlib/src/main/res\"\n  cat > \"$androidlib/AndroidManifest.xml\"\
        \ <<'XML'\n<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\"\
        \ package=\"com.zeywin.legacyres\" />\nXML\n  cat > \"$androidlib/build.gradle\"\
        \ <<'GRADLE'\nplugins {\n    id 'com.android.library'\n}\n\nandroid {\n  \
        \  compileSdk 34\n    namespace 'com.zeywin.legacyres'\n}\nGRADLE\n  find\
        \ \"$androidlib\" -maxdepth 4 -type f | sort\nelse\n  echo \"No legacy Assets/Plugins/Android/res\
        \ directory found.\"\nfi\n"
    - name: Prepare Firebase SDK
      shell: bash
      run: "set -euo pipefail\nif ! grep -R --include='*.cs' -E 'using Firebase|Firebase\\\
        .' game/Assets >/dev/null 2>&1; then\n  echo \"No Firebase C# references found;\
        \ skipping Firebase SDK preparation.\"\n  exit 0\nfi\n\nif [ -d game/Assets/Firebase\
        \ ]; then\n  echo \"Assets/Firebase already exists; keeping game Firebase\
        \ SDK files.\"\n  exit 0\nfi\n\necho \"Firebase C# references found; installing\
        \ Firebase Unity SDK 13.0.0.\"\nwork=\"$RUNNER_TEMP/firebase-unity-sdk\"\n\
        rm -rf \"$work\"\nmkdir -p \"$work\"\ncurl -L --retry 3 --retry-delay 5 --connect-timeout\
        \ 30 \\\n  -o \"$work/firebase_unity_sdk_13.0.0.zip\" \\\n  https://dl.google.com/firebase/sdk/unity/firebase_unity_sdk_13.0.0.zip\n\
        unzip -q \"$work/firebase_unity_sdk_13.0.0.zip\" \\\n  '*FirebaseAnalytics*.unitypackage'\
        \ \\\n  '*FirebaseRemoteConfig*.unitypackage' \\\n  '*FirebaseMessaging*.unitypackage'\
        \ \\\n  -d \"$work/packages\"\nfind \"$work/packages\" -name '*.unitypackage'\
        \ -print | sort\n\npython3 <<'PY'\nimport os\nimport pathlib\nimport shutil\n\
        import tarfile\nimport tempfile\n\nroot = pathlib.Path('game')\npackage_dir\
        \ = pathlib.Path(os.environ['RUNNER_TEMP']) / 'firebase-unity-sdk' / 'packages'\n\
        packages = []\nfor needle in ('FirebaseAnalytics', 'FirebaseRemoteConfig',\
        \ 'FirebaseMessaging'):\n    matches = sorted(package_dir.rglob(f'*{needle}*.unitypackage'))\n\
        \    if not matches:\n        raise FileNotFoundError(f'Firebase Unity package\
        \ not found in SDK zip: {needle}')\n    packages.append(matches[0])\n\nfor\
        \ package in packages:\n    print(f'Extracting {package.name}')\n    with\
        \ tempfile.TemporaryDirectory() as td:\n        temp = pathlib.Path(td)\n\
        \        with tarfile.open(package, 'r:gz') as tar:\n            tar.extractall(temp)\n\
        \        for entry in temp.iterdir():\n            pathname = entry / 'pathname'\n\
        \            asset = entry / 'asset'\n            meta = entry / 'asset.meta'\n\
        \            if not pathname.exists() or not asset.exists():\n           \
        \     continue\n            rel = pathname.read_text(encoding='utf-8').strip()\n\
        \            if not rel.startswith('Assets/'):\n                continue\n\
        \            out = root / rel\n            out.parent.mkdir(parents=True,\
        \ exist_ok=True)\n            shutil.copyfile(asset, out)\n            if\
        \ meta.exists():\n                shutil.copyfile(meta, pathlib.Path(str(out)\
        \ + '.meta'))\n\nprint('Firebase Unity SDK files prepared.')\nPY\n\nfind game/Assets/Firebase\
        \ -maxdepth 3 -type f | sed -n '1,80p'\n"
    - name: Normalize legacy Android resources after SDK prep
