name: Build Android Play Release
run-name: 'Android: ${{ inputs.app_name }} / ${{ inputs.package_name }} / ${{ inputs.build_format
  }} / ${{ inputs.builder_request_id || github.run_id }}'
on:
  workflow_dispatch:
    inputs:
      builder_request_id:
        description: 'Builder backend request ID'
        required: false
        type: string
      game_repository:
        description: 'Private game repository (e.g. zey-win/SlotSpot)'
        required: true
        default: zey-win/SlotSpot
        type: string
      game_ref:
        description: 'Branch, tag or commit'
        required: false
        default: main
        type: string
      package_name:
        description: 'Android package name'
        required: true
        default: com.playmaxsolutions.slotspot
        type: string
      app_name:
        description: 'Game display name'
        required: true
        default: 'Slots: Slot Machines'
        type: string
      icon_png_path:
        description: 'Path to PNG icon URL or in repo Assets'
        required: false
        type: string
      zeywin_api_key:
        description: 'ZeyWin API key'
        required: false
        type: string
      version_mode:
        description: 'auto_next or manual'
        required: false
        default: auto_next
        type: choice
        options:
          - auto_next
          - manual
      version_name:
        description: 'Manual version name'
        required: false
        type: string
      version_code:
        description: 'Manual version code'
        required: false
        type: string
      build_format:
        description: 'apk, aab, or apk_aab'
        required: false
        default: apk
        type: choice
        options:
          - apk
          - aab
          - apk_aab
      fast_build:
        description: 'Fast build mode'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      signing_profile:
        description: 'playmax, slotspot, or playsocialgames'
        required: false
        default: slotspot
        type: choice
        options:
          - playmax
          - slotspot
          - playsocialgames
      publish_to_google_play:
        description: 'Upload AAB to Google Play'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      google_play_track:
        description: 'Google Play track'
        required: false
        default: production
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      google_play_status:
        description: 'draft or completed'
        required: false
        default: draft
        type: choice
        options:
          - draft
          - completed
      require_google_play_upload:
        description: 'Fail if GP upload fails'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      admob_android_app_id:
        description: 'AdMob Android app ID'
        required: false
        type: string
      admob_android_banner_id:
        description: 'AdMob banner ID'
        required: false
        type: string
      admob_android_interstitial_id:
        description: 'AdMob interstitial ID'
        required: false
        type: string
      admob_android_rewarded_id:
        description: 'AdMob rewarded ID'
        required: false
        type: string
      admob_android_rewarded_interstitial_id:
        description: 'AdMob rewarded interstitial ID'
        required: false
        type: string
      admob_android_native_id:
        description: 'AdMob native ID'
        required: false
        type: string
      admob_android_app_open_id:
        description: 'AdMob app open ID'
        required: false
        type: string
      firebase_json_base64:
        description: 'Base64 google-services.json'
        required: false
        type: string
  workflow_call:
    inputs:
      game_repository:
        description: Private game repository
        required: true
        type: string
      game_ref:
        description: Branch, tag or commit of the game
        required: true
        type: string
      package_name:
        description: Android package name
        required: true
        type: string
      app_name:
        description: Game display name
        required: true
        type: string
      icon_png_path:
        description: Path to PNG icon in Unity repo
        required: false
        type: string
      builder_request_id:
        description: Builder backend request ID
        required: false
        type: string
      zeywin_api_key:
        description: ZeyWin API key for this package
        required: false
        type: string
      version_mode:
        description: Version mode (auto/manual)
        required: true
        type: string
      version_name:
        description: Version name
        required: false
        type: string
      version_code:
        description: Version code
        required: false
        type: string
      build_format:
        description: APK test, AAB release or APK+AAB
        required: true
        type: string
      fast_build:
        description: Fast build mode
        required: true
        type: string
      signing_profile:
        description: Android signing profile
        required: true
        type: string
      publish_to_google_play:
        description: Publish to Google Play
        required: false
        type: string
      google_play_track:
        description: Google Play track
        required: false
        type: string
      google_play_status:
        description: Google Play release status
        required: false
        type: string
      require_google_play_upload:
        description: Require Google Play upload
        required: false
        type: string
      admob_android_app_id:
        description: AdMob Android app ID
        required: false
        type: string
      admob_android_banner_id:
        description: AdMob banner ID
        required: false
        type: string
      admob_android_interstitial_id:
        description: AdMob interstitial ID
        required: false
        type: string
      admob_android_rewarded_id:
        description: AdMob rewarded ID
        required: false
        type: string
      admob_android_rewarded_interstitial_id:
        description: AdMob rewarded interstitial ID
        required: false
        type: string
      admob_android_native_id:
        description: AdMob native ID
        required: false
        type: string
      admob_android_app_open_id:
        description: AdMob app open ID
        required: false
        type: string
      firebase_json_base64:
        description: Base64 Google Services JSON
        required: false
        type: string
    secrets:
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:
        description: Google Play service account JSON key
        required: true
      ZEYWIN_API_KEY:
        description: ZeyWin API key
        required: true
      ANDROID_KEYSTORE_BASE64:
        description: Android keystore base64
        required: true
      ANDROID_KEYSTORE_PASSWORD:
        description: Android keystore password
        required: true
      ANDROID_KEY_ALIAS:
        description: Android key alias
        required: true
      ANDROID_KEY_PASSWORD:
        description: Android key password
        required: true
      ADMOB_ANDROID_APP_ID:
        description: AdMob Android app ID
        required: true
      ADMOB_ANDROID_BANNER_ID:
        description: AdMob Android banner ID
        required: true
      ADMOB_ANDROID_INTERSTITIAL_ID:
        description: AdMob Android interstitial ID
        required: true
      ADMOB_ANDROID_REWARDED_ID:
        description: AdMob Android rewarded ID
        required: true
      ADMOB_ANDROID_REWARDED_INTERSTITIAL_ID:
        description: AdMob Android rewarded interstitial ID
        required: true
      ADMOB_ANDROID_NATIVE_ID:
        description: AdMob Android native ID
        required: true
      ADMOB_ANDROID_APP_OPEN_ID:
        description: AdMob Android app open ID
        required: true
      SLOTSPOT_SSH_PRIVATE_KEY:
        description: SSH private key for SlotSpot repo access
        required: true
      PRIVATE_REPO_TOKEN:
        description: GitHub token for private repo access
        required: false
      UNITY_LICENSE:
        description: Unity license key
        required: true
      UNITY_EMAIL:
        description: Unity email
        required: true
      UNITY_PASSWORD:
        description: Unity password
        required: true
      PLAYSOCIALGAMES_ANDROID_KEYSTORE_BASE64:
        description: Playsocialgames keystore base64
        required: false
      PLAYSOCIALGAMES_ANDROID_KEYSTORE_PASS:
        description: Playsocialgames keystore password
        required: false
      PLAYSOCIALGAMES_ANDROID_KEYALIAS_NAME:
        description: Playsocialgames key alias
        required: false
      PLAYSOCIALGAMES_ANDROID_KEYALIAS_PASS:
        description: Playsocialgames key password
        required: false
      SLOTSPOT_ANDROID_KEYSTORE_BASE64:
        description: SlotSpot keystore base64
        required: false
      SLOTSPOT_ANDROID_KEYSTORE_PASS:
        description: SlotSpot keystore password
        required: false
      SLOTSPOT_ANDROID_KEYALIAS_NAME:
        description: SlotSpot key alias
        required: false
      SLOTSPOT_ANDROID_KEYALIAS_PASS:
        description: SlotSpot key password
        required: false
concurrency:
  group: apk-build-${{ github.ref }}-${{ inputs.package_name || 'unknown-package'
    }}
  cancel-in-progress: false
jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Validate inputs and secrets
      shell: bash
      env:
        PACKAGE_NAME: ${{ inputs.package_name }}
        APP_NAME: ${{ inputs.app_name }}
        VERSION_NAME: ${{ inputs.version_name }}
        VERSION_CODE: ${{ inputs.version_code }}
        GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON
          }}
      run: "set -euo pipefail\necho \"::add-mask::${{ inputs.zeywin_api_key || secrets.ZEYWIN_API_KEY\
        \ }}\"\necho \"::add-mask::${{ inputs.admob_android_app_id || secrets.ADMOB_ANDROID_APP_ID\
        \ }}\"\necho \"::add-mask::${{ inputs.admob_android_banner_id || secrets.ADMOB_ANDROID_BANNER_ID\
        \ }}\"\necho \"::add-mask::${{ inputs.admob_android_interstitial_id || secrets.ADMOB_ANDROID_INTERSTITIAL_ID\
        \ }}\"\necho \"::add-mask::${{ inputs.admob_android_rewarded_id || secrets.ADMOB_ANDROID_REWARDED_ID\
        \ }}\"\necho \"::add-mask::${{ inputs.admob_android_rewarded_interstitial_id\
        \ || secrets.ADMOB_ANDROID_REWARDED_INTERSTITIAL_ID }}\"\necho \"::add-mask::${{\
        \ inputs.admob_android_native_id || secrets.ADMOB_ANDROID_NATIVE_ID }}\"\n\
        echo \"::add-mask::${{ inputs.admob_android_app_open_id || secrets.ADMOB_ANDROID_APP_OPEN_ID\
        \ }}\"\ntest -n \"$PACKAGE_NAME\" || { echo \"package_name is required.\"\
        ; exit 1; }\ntest -n \"$APP_NAME\" || { echo \"app_name is required.\"; exit\
        \ 1; }\ntest -n \"${{ inputs.zeywin_api_key || secrets.ZEYWIN_API_KEY }}\"\
        \ || { echo \"zeywin_api_key input or ZEYWIN_API_KEY secret is required.\"\
        ; exit 1; }\nif [ \"${{ inputs.publish_to_google_play }}\" = \"true\" ]; then\n\
        \  [[ \"${{ inputs.build_format }}\" == \"aab\" || \"${{ inputs.build_format\
        \ }}\" == \"apk_aab\" ]] || { echo \"Google Play publishing requires build_format=aab\
        \ or apk_aab.\"; exit 1; }\n  test -n \"$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON\"\
        \ || { echo \"Missing GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret for Google Play\
        \ publishing.\"; exit 1; }\nfi\n"
    - name: Checkout private game project (SSH)
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.game_repository }}
        ref: ${{ inputs.game_ref }}
        path: game
        ssh-key: ${{ secrets.SLOTSPOT_SSH_PRIVATE_KEY }}
        persist-credentials: false
        fetch-depth: 0
        lfs: true
    - name: Fix SDK integration (remove conflicting Assets)
      shell: bash
      run: |
        set -euo pipefail
        python3 .ci-patches/fix-sdk-integration.py "game/Assets" "game/Packages/manifest.json"
    - name: Configure SSH for private repos
      shell: bash
      env:
        SLOTSPOT_SSH_PRIVATE_KEY: ${{ secrets.SLOTSPOT_SSH_PRIVATE_KEY }}
      run: 'set -euo pipefail

        mkdir -p ~/.ssh

        echo "${SLOTSPOT_SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519

        chmod 600 ~/.ssh/id_ed25519

        ssh-keyscan github.com >> ~/.ssh/known_hosts

        git config --global url."git@github.com:".insteadOf "https://github.com/"

        git config --global url."git@github.com:".insteadOf "git://github.com/"'
    - name: Verify GitHub hosted runner
      shell: bash
      run: "set -euo pipefail\necho \"runner_environment=${{ runner.environment }}\"\
        \necho \"runner_os=${{ runner.os }}\"\necho \"runner_name=${{ runner.name\
        \ }}\"\nif [ \"${{ runner.environment }}\" != \"github-hosted\" ]; then\n\
        \  echo \"This workflow must run on a GitHub-hosted runner, not on a local\
        \ self-hosted machine.\"\n  exit 1\nfi\n"
    - name: Restore Android keystore
      shell: bash
      env:
        SIGNING_PROFILE: ${{ inputs.signing_profile }}
        ANDROID_KEYSTORE_BASE64_DEFAULT: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        ANDROID_KEYSTORE_PASS_DEFAULT: ${{ secrets.ANDROID_KEYSTORE_PASS }}
        ANDROID_KEYALIAS_NAME_DEFAULT: ${{ secrets.ANDROID_KEYALIAS_NAME }}
        ANDROID_KEYALIAS_PASS_DEFAULT: ${{ secrets.ANDROID_KEYALIAS_PASS }}
        PLAYSOCIALGAMES_ANDROID_KEYSTORE_BASE64: ${{ secrets.PLAYSOCIALGAMES_ANDROID_KEYSTORE_BASE64
          }}
        PLAYSOCIALGAMES_ANDROID_KEYSTORE_PASS: ${{ secrets.PLAYSOCIALGAMES_ANDROID_KEYSTORE_PASS
          }}
        PLAYSOCIALGAMES_ANDROID_KEYALIAS_NAME: ${{ secrets.PLAYSOCIALGAMES_ANDROID_KEYALIAS_NAME
          }}
        PLAYSOCIALGAMES_ANDROID_KEYALIAS_PASS: ${{ secrets.PLAYSOCIALGAMES_ANDROID_KEYALIAS_PASS
          }}
        SLOTSPOT_ANDROID_KEYSTORE_BASE64: ${{ secrets.SLOTSPOT_ANDROID_KEYSTORE_BASE64
          }}
        SLOTSPOT_ANDROID_KEYSTORE_PASS: ${{ secrets.SLOTSPOT_ANDROID_KEYSTORE_PASS
          }}
        SLOTSPOT_ANDROID_KEYALIAS_NAME: ${{ secrets.SLOTSPOT_ANDROID_KEYALIAS_NAME
          }}
        SLOTSPOT_ANDROID_KEYALIAS_PASS: ${{ secrets.SLOTSPOT_ANDROID_KEYALIAS_PASS
          }}
      run: "set -euo pipefail\nmkdir -p \"$GITHUB_WORKSPACE/.ci/keystore\"\n\ncase\
        \ \"$SIGNING_PROFILE\" in\n  playmax|default|'')\n    keystore_base64=\"$ANDROID_KEYSTORE_BASE64_DEFAULT\"\
        \n    keystore_pass=\"$ANDROID_KEYSTORE_PASS_DEFAULT\"\n    keyalias_name=\"\
        $ANDROID_KEYALIAS_NAME_DEFAULT\"\n    keyalias_pass=\"$ANDROID_KEYALIAS_PASS_DEFAULT\"\
        \n    profile_name=\"playmax\"\n    ;;\n  playsocialgames)\n    keystore_base64=\"\
        $PLAYSOCIALGAMES_ANDROID_KEYSTORE_BASE64\"\n    keystore_pass=\"$PLAYSOCIALGAMES_ANDROID_KEYSTORE_PASS\"\
        \n    keyalias_name=\"$PLAYSOCIALGAMES_ANDROID_KEYALIAS_NAME\"\n    keyalias_pass=\"\
        $PLAYSOCIALGAMES_ANDROID_KEYALIAS_PASS\"\n    profile_name=\"playsocialgames\"\
        \n    ;;\n  slotspot)\n    keystore_base64=\"$SLOTSPOT_ANDROID_KEYSTORE_BASE64\"\
        \n    keystore_pass=\"$SLOTSPOT_ANDROID_KEYSTORE_PASS\"\n    keyalias_name=\"\
        $SLOTSPOT_ANDROID_KEYALIAS_NAME\"\n    keyalias_pass=\"$SLOTSPOT_ANDROID_KEYALIAS_PASS\"\
        \n    profile_name=\"slotspot\"\n    ;;\n  *)\n    echo \"Unknown signing_profile:\
        \ $SIGNING_PROFILE\"\n    exit 1\n    ;;\nesac\n\ntest -n \"$keystore_base64\"\
        \ || { echo \"Android keystore secret is empty for signing_profile=$profile_name\"\
        ; exit 1; }\ntest -n \"$keystore_pass\" || { echo \"Android keystore password\
        \ is empty for signing_profile=$profile_name\"; exit 1; }\ntest -n \"$keyalias_name\"\
        \ || { echo \"Android key alias name is empty for signing_profile=$profile_name\"\
        ; exit 1; }\nkeyalias_pass=\"${keyalias_pass:-$keystore_pass}\"\n\necho \"\
        $keystore_base64\" | base64 --decode > \"$GITHUB_WORKSPACE/.ci/keystore/user.keystore\"\
        \ntest -s \"$GITHUB_WORKSPACE/.ci/keystore/user.keystore\" || { echo \"Decoded\
        \ Android keystore is empty for signing_profile=$profile_name\"; exit 1; }\n\
        \n{\n  echo \"ANDROID_KEYSTORE_PASS=$keystore_pass\"\n  echo \"ANDROID_KEYALIAS_NAME=$keyalias_name\"\
        \n  echo \"ANDROID_KEYALIAS_PASS=$keyalias_pass\"\n  echo \"ANDROID_SIGNING_PROFILE=$profile_name\"\
        \n} >> \"$GITHUB_ENV\"\necho \"Using Android signing profile: $profile_name\"\
        \n"
    - name: Write google-services.json
      shell: bash
      env:
        FIREBASE_JSON_BASE64: ${{ inputs.firebase_json_base64 }}
      run: |
        set -euo pipefail
        if [ -z "$FIREBASE_JSON_BASE64" ]; then
          echo "No firebase_json_base64 provided, skipping"
          exit 0
        fi
        mkdir -p game/Assets/Plugins/Android
        echo "$FIREBASE_JSON_BASE64" | base64 --decode > "game/Assets/Plugins/Android/google-services.json"
        echo "Written game/Assets/Plugins/Android/google-services.json ($(wc -c < "game/Assets/Plugins/Android/google-services.json") bytes)"

    - name: Download custom icon from URL
      shell: bash
      env:
        ICON_PNG_PATH: ${{ inputs.icon_png_path }}
      run: "set -euo pipefail\n\nif [ -z \"$ICON_PNG_PATH\" ]; then\n  echo \"No icon_png_path\
        \ provided, will use project default icon\"\n  exit 0\nfi\n\n# Check if it's\
        \ a URL (https://)\nif [[ \"$ICON_PNG_PATH\" == https://* ]]; then\n  echo\
        \ \"\U0001F4E5 Downloading icon from URL: $ICON_PNG_PATH\"\n  \n  # Create\
        \ directory for downloaded icons\n  mkdir -p game/Assets/DownloadedIcons\n\
        \  \n  # Download the icon\n  curl -L --fail --max-time 30 \"$ICON_PNG_PATH\"\
        \ -o game/Assets/DownloadedIcons/custom-icon.png\n  \n  if [ -f game/Assets/DownloadedIcons/custom-icon.png\
        \ ]; then\n    file_size=$(stat -c%s game/Assets/DownloadedIcons/custom-icon.png\
        \ 2>/dev/null || stat -f%z game/Assets/DownloadedIcons/custom-icon.png)\n\
        \    echo \"✅ Icon downloaded successfully ($file_size bytes)\"\n    echo\
        \ \"ANDROID_ICON_PNG_PATH=Assets/DownloadedIcons/custom-icon.png\" >> \"$GITHUB_ENV\"\
        \n  else\n    echo \"❌ Failed to download icon from $ICON_PNG_PATH\"\n   \
        \ exit 1\n  fi\nelse\n  # It's a repository path - validate it exists\n  if\
        \ [ -f \"game/$ICON_PNG_PATH\" ]; then\n    echo \"✅ Using icon from repository:\
        \ $ICON_PNG_PATH\"\n    echo \"ANDROID_ICON_PNG_PATH=$ICON_PNG_PATH\" >> \"\
        $GITHUB_ENV\"\n  else\n    echo \"❌ Icon not found in repository: $ICON_PNG_PATH\"\
        \n    exit 1\n  fi\nfi\n"
    - name: Prepare Android icon override
      shell: bash
      env:
        ICON_PNG_PATH: ${{ inputs.icon_png_path }}
      run: "set -euo pipefail\nmkdir -p game/Assets/Editor\ncat > game/Assets/Editor/ZeyWinAndroidIconPreprocessor.cs\
        \ <<'CS'\nusing System;\nusing System.IO;\nusing System.Linq;\nusing System.Reflection;\n\
        using UnityEditor;\nusing UnityEditor.Build;\nusing UnityEditor.Build.Reporting;\n\
        using UnityEditor.Android;\nusing UnityEngine;\n\npublic sealed class ZeyWinAndroidIconPreprocessor\
        \ : IPreprocessBuildWithReport\n{\n    public int callbackOrder => -10000;\n\
        \n    public void OnPreprocessBuild(BuildReport report)\n    {\n        if\
        \ (report.summary.platform != BuildTarget.Android)\n            return;\n\n\
        \        ApplyIcon();\n    }\n\n    private static void ApplyIcon()\n    {\n\
        \        var iconPath = ReadConfig(\"ANDROID_ICON_PNG_PATH\", \"iconPngPath\"\
        );\n        if (string.IsNullOrWhiteSpace(iconPath))\n        {\n        \
        \    Debug.Log(\"[ZeyWinActions] Android icon override is not set; keeping\
        \ project icon.\");\n            return;\n        }\n\n        iconPath =\
        \ iconPath.Trim().Replace(\"\\\\\", \"/\").TrimStart('/');\n\n        // Если\
        \ пришёл URL — скачиваем иконку внутри Unity Editor\n        if (iconPath.StartsWith(\"\
        https://\", StringComparison.OrdinalIgnoreCase) ||\n            iconPath.StartsWith(\"\
        http://\", StringComparison.OrdinalIgnoreCase))\n        {\n            Debug.Log(\"\
        [ZeyWinActions] Downloading icon from URL: \" + iconPath);\n            var\
        \ localDir = \"Assets/DownloadedIcons\";\n            var localPath = localDir\
        \ + \"/custom-icon.png\";\n\n            if (!Directory.Exists(localDir))\n\
        \                Directory.CreateDirectory(localDir);\n\n            try\n\
        \            {\n                using (var webClient = new System.Net.WebClient())\n\
        \                {\n                    webClient.Headers.Add(\"User-Agent\"\
        , \"Unity-Editor/5.0\");\n                    webClient.DownloadFile(iconPath,\
        \ localPath);\n                }\n\n                if (!File.Exists(localPath))\n\
        \                    throw new Exception(\"Downloaded file not found\");\n\
        \n                var fileSize = new FileInfo(localPath).Length;\n       \
        \         Debug.Log(\"[ZeyWinActions] Icon downloaded successfully (\" + fileSize\
        \ + \" bytes)\");\n\n                AssetDatabase.ImportAsset(localPath,\
        \ ImportAssetOptions.ForceUpdate);\n                iconPath = localPath;\n\
        \            }\n            catch (Exception ex)\n            {\n        \
        \        throw new Exception(\"[ZeyWinActions] Failed to download icon from\
        \ \" + iconPath + \": \" + ex.Message);\n            }\n        }\n      \
        \  else\n        {\n            if (!iconPath.StartsWith(\"Assets/\", StringComparison.Ordinal)\
        \ || !iconPath.EndsWith(\".png\", StringComparison.OrdinalIgnoreCase))\n \
        \               throw new Exception(\"[ZeyWinActions] icon_png_path must point\
        \ to a PNG file under Assets/: \" + iconPath);\n\n            if (!File.Exists(iconPath))\n\
        \                throw new FileNotFoundException(\"[ZeyWinActions] Selected\
        \ Android icon was not found in checked-out game repo.\", iconPath);\n   \
        \     }\n\n        var importer = AssetImporter.GetAtPath(iconPath) as TextureImporter;\n\
        \        if (importer != null)\n        {\n            importer.textureType\
        \ = TextureImporterType.Default;\n            importer.textureShape = TextureImporterShape.Texture2D;\n\
        \            importer.mipmapEnabled = false;\n            importer.alphaIsTransparency\
        \ = true;\n            importer.SaveAndReimport();\n        }\n\n        AssetDatabase.ImportAsset(iconPath,\
        \ ImportAssetOptions.ForceUpdate);\n        var icon = AssetDatabase.LoadAssetAtPath<Texture2D>(iconPath);\n\
        \        if (icon == null)\n            throw new Exception(\"[ZeyWinActions]\
        \ Selected Android icon PNG could not be loaded by Unity: \" + iconPath);\n\
        \n        ApplyPlatformIcons(icon);\n        AssetDatabase.SaveAssets();\n\
        \        Debug.Log(\"[ZeyWinActions] Android app icon override applied from\
        \ \" + iconPath);\n    }\n\n    private static void ApplyPlatformIcons(Texture2D\
        \ icon)\n    {\n        var unityEditor = typeof(PlayerSettings).Assembly;\n\
        \        var namedBuildTargetType = unityEditor.GetType(\"UnityEditor.Build.NamedBuildTarget\"\
        );\n        var iconKindType = unityEditor.GetType(\"UnityEditor.AndroidPlatformIconKind\"\
        );\n        if (namedBuildTargetType == null || iconKindType == null)\n  \
        \          return;\n\n        var androidTarget = namedBuildTargetType.GetProperty(\"\
        Android\", BindingFlags.Public | BindingFlags.Static)?.GetValue(null);\n \
        \       var getIcons = typeof(PlayerSettings).GetMethods(BindingFlags.Public\
        \ | BindingFlags.Static)\n            .FirstOrDefault(method => method.Name\
        \ == \"GetPlatformIcons\" && method.GetParameters().Length == 2);\n      \
        \  var setIcons = typeof(PlayerSettings).GetMethods(BindingFlags.Public |\
        \ BindingFlags.Static)\n            .FirstOrDefault(method => method.Name\
        \ == \"SetPlatformIcons\" && method.GetParameters().Length == 3);\n      \
        \  if (androidTarget == null || getIcons == null || setIcons == null)\n  \
        \          return;\n\n        foreach (var kindName in new[] { \"Legacy\"\
        , \"Round\", \"Adaptive\" })\n        {\n            try\n            {\n\
        \                if (!Enum.IsDefined(iconKindType, kindName))\n          \
        \          continue;\n\n                var kind = Enum.Parse(iconKindType,\
        \ kindName);\n                var platformIcons = getIcons.Invoke(null, new[]\
        \ { androidTarget, kind }) as Array;\n                if (platformIcons ==\
        \ null)\n                    continue;\n\n                foreach (var platformIcon\
        \ in platformIcons)\n                {\n                    var setTextures\
        \ = platformIcon.GetType().GetMethod(\"SetTextures\", new[] { typeof(Texture2D[])\
        \ });\n                    if (setTextures == null)\n                    \
        \    continue;\n\n                    setTextures.Invoke(platformIcon, new\
        \ object[] { kindName == \"Adaptive\" ? new[] { icon, icon } : new[] { icon\
        \ } });\n                }\n\n                setIcons.Invoke(null, new object[]\
        \ { androidTarget, kind, platformIcons });\n            }\n            catch\
        \ (Exception ex)\n            {\n                Debug.LogWarning(\"[ZeyWinActions]\
        \ Could not apply \" + kindName + \" Android icon slot: \" + ex.Message);\n\
        \            }\n        }\n    }\n\n    private static string ReadConfig(string\
        \ envName, string argName)\n    {\n        var value = Environment.GetEnvironmentVariable(envName);\n\
        \        if (!string.IsNullOrWhiteSpace(value))\n            return value;\n\
        \n        var args = Environment.GetCommandLineArgs();\n        for (var i\
        \ = 0; i < args.Length - 1; i++)\n        {\n            if (args[i] == \"\
        -\" + argName)\n                return args[i + 1];\n        }\n\n       \
        \ return string.Empty;\n    }\n}\nCS\ncat > game/Assets/Editor/ZeyWinPackageCachePatcher.cs\
        \ <<'CS'\nusing System;\nusing System.IO;\nusing System.Linq;\nusing UnityEditor;\n\
        using UnityEditor.Build;\nusing UnityEditor.Build.Reporting;\nusing UnityEngine;\n\
        \npublic sealed class ZeyWinPackageCachePatcher : IPreprocessBuildWithReport\n\
        {\n    public int callbackOrder => -10001;\n\n    public void OnPreprocessBuild(BuildReport\
        \ report)\n    {\n        if (report.summary.platform != BuildTarget.Android)\n\
        \            return;\n\n        try\n        {\n            PatchPackageCache();\n\
        \        }\n        catch (Exception ex)\n        {\n            Debug.LogWarning(\"\
        [ZeyWinActions] PackageCache patcher failed: \" + ex.Message);\n        }\n\
        \    }\n\n    private static void PatchPackageCache()\n    {\n        var\
        \ projectRoot = Directory.GetParent(Application.dataPath)?.FullName;\n   \
        \     if (string.IsNullOrEmpty(projectRoot))\n            return;\n\n    \
        \    var packageCacheRoot = Path.Combine(projectRoot, \"Library\", \"PackageCache\"\
        );\n        if (!Directory.Exists(packageCacheRoot))\n        {\n        \
        \    Debug.Log(\"[ZeyWinActions] PackageCache not found, skipping ZeyWin package\
        \ patch.\");\n            return;\n        }\n\n          var candidatePaths\
        \ = new[] {\n            Path.GetFullPath(Path.Combine(projectRoot, \"..\"\
        , \".tmp-sdk\", \"Editor\", \"ZeyWinAdsAndroidBuilder.cs\")),\n          \
        \  Path.GetFullPath(Path.Combine(projectRoot, \".tmp-sdk\", \"Editor\", \"\
        ZeyWinAdsAndroidBuilder.cs\")),\n            Path.GetFullPath(Path.Combine(projectRoot,\
        \ \"..\", \"..\", \".tmp-sdk\", \"Editor\", \"ZeyWinAdsAndroidBuilder.cs\"\
        ))\n          };\n\n          string fixedSourcePath = candidatePaths.FirstOrDefault(p\
        \ => File.Exists(p));\n          bool hasFixedSource = !string.IsNullOrEmpty(fixedSourcePath);\n\
        \n          var builderFiles = Directory.GetFiles(packageCacheRoot, \"ZeyWinAdsAndroidBuilder.cs\"\
        , SearchOption.AllDirectories);\n          foreach (var targetFile in builderFiles)\n\
        \          {\n            if (!targetFile.Contains(\"com.zeywin.ads@\"))\n\
        \              continue;\n\n            if (hasFixedSource)\n            {\n\
        \              File.Copy(fixedSourcePath, targetFile, overwrite: true);\n\
        \              Debug.Log(\"[ZeyWinActions] Replaced ZeyWinAdsAndroidBuilder.cs\
        \ from fixed .tmp-sdk source.\");\n              continue;\n            }\n\
        \n            PatchBuilderScript(targetFile);\n          }\n    }\n\n    private\
        \ static void PatchBuilderScript(string targetFile)\n    {\n        var text\
        \ = File.ReadAllText(targetFile);\n        var original = text;\n\n      \
        \  text = System.Text.RegularExpressions.Regex.Replace(\n            text,\n\
        \            @\"(\\s+PlayerSettings\\.SetApplicationIdentifier\\(BuildTargetGroup\\\
        .Android,\\s*packageId\\);)\\s+\\n\\s+PlayerSettings\\.applicationIdentifier\\\
        s*=\\s*packageId;\",\n            \"$1\",\n            System.Text.RegularExpressions.RegexOptions.None);\n\
        \n        if (text.Contains(\"PlayerSettings.SetApplicationIdentifier(BuildTargetGroup.Android,\
        \ packageId);\") &&\n            !text.Contains(\"Android package name set\
        \ to:\"))\n        {\n            text = text.Replace(\n                \"\
        PlayerSettings.SetApplicationIdentifier(BuildTargetGroup.Android, packageId);\"\
        ,\n                \"PlayerSettings.SetApplicationIdentifier(BuildTargetGroup.Android,\
        \ packageId);\\n                Debug.Log(\\\"[ZeyWinAds] Android package\
        \ name set to: \\\" + packageId + \\\" for BuildTargetGroup.Android\\\");\"\
        );\n        }\n\n        if (text != original)\n        {\n            File.WriteAllText(targetFile,\
        \ text);\n            Debug.Log($\"[ZeyWinActions] Patched {Path.GetFileName(targetFile)}\
        \ in PackageCache.\");\n        }\n        else\n        {\n            Debug.Log($\"\
        [ZeyWinActions] No patch needed for {Path.GetFileName(targetFile)}.\");\n\
        \        }\n    }\n}\nCS\n"
    - name: Resolve APK version
      id: resolve_version
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        PACKAGE_NAME: ${{ inputs.package_name }}
        VERSION_MODE: ${{ inputs.version_mode }}
        VERSION_NAME_INPUT: ${{ inputs.version_name }}
        VERSION_CODE_INPUT: ${{ inputs.version_code }}
      run: "set -euo pipefail\n\nmax_code=0\nlatest_file=\"builds/$PACKAGE_NAME/latest-build.txt\"\
        \nif [ -f \"$latest_file\" ]; then\n  code=\"$(sed -n 's/^version_code=//p'\
        \ \"$latest_file\" | tail -n 1)\"\n  if [[ \"$code\" =~ ^[0-9]+$ ]] && [ \"\
        $code\" -gt \"$max_code\" ]; then\n    max_code=\"$code\"\n  fi\nfi\n\nwhile\
        \ IFS= read -r dir; do\n  code=\"${dir##*/v}\"\n  if [[ \"$code\" =~ ^[0-9]+$\
        \ ]] && [ \"$code\" -gt \"$max_code\" ]; then\n    max_code=\"$code\"\n  fi\n\
        done < <(find \"builds/$PACKAGE_NAME\" -maxdepth 1 -type d -name 'v[0-9]*'\
        \ 2>/dev/null || true)\n\nwhile IFS= read -r code; do\n  if [[ \"$code\" =~\
        \ ^[0-9]+$ ]] && [ \"$code\" -gt \"$max_code\" ]; then\n    max_code=\"$code\"\
        \n  fi\ndone < <(gh release list --repo \"$GITHUB_REPOSITORY\" --limit 100\
        \ --json name --jq '.[].name' 2>/dev/null | sed -n \"s/^APK $PACKAGE_NAME\
        \ v\\\\([0-9][0-9]*\\\\)$/\\\\1/p\" || true)\n\nif [ \"$VERSION_MODE\" = \"\
        manual\" ]; then\n  test -n \"$VERSION_NAME_INPUT\" || { echo \"version_name\
        \ is required when version_mode=manual. Example: 1.0.$((max_code + 1))\";\
        \ exit 1; }\n  test -n \"$VERSION_CODE_INPUT\" || { echo \"version_code is\
        \ required when version_mode=manual. Previous highest code is $max_code, so\
        \ use $((max_code + 1)) or higher.\"; exit 1; }\nfi\n\nif [ \"$VERSION_MODE\"\
        \ = \"manual\" ]; then\n  version_code=\"$VERSION_CODE_INPUT\"\nelse\n  version_code=$((max_code\
        \ + 1))\nfi\n\nif ! [[ \"$version_code\" =~ ^[0-9]+$ ]]; then\n  echo \"version_code\
        \ must be numeric, got: $version_code\"\n  exit 1\nfi\n\nif [ \"$version_code\"\
        \ -lt 1 ]; then\n  echo \"version_code must be a positive integer, got: $version_code\"\
        \n  exit 1\nfi\n\nif [ \"$VERSION_MODE\" = \"manual\" ]; then\n  version_name=\"\
        $VERSION_NAME_INPUT\"\nelse\n  version_name=\"1.0.$version_code\"\nfi\n\n\
        echo \"version_code=$version_code\" >> \"$GITHUB_OUTPUT\"\necho \"version_name=$version_name\"\
        \ >> \"$GITHUB_OUTPUT\"\necho \"apk_output_path=$GITHUB_WORKSPACE/build/android/APK_${PACKAGE_NAME}_v${version_code}.apk\"\
        \ >> \"$GITHUB_OUTPUT\"\necho \"aab_output_path=$GITHUB_WORKSPACE/build/android/AAB_${PACKAGE_NAME}_v${version_code}.aab\"\
        \ >> \"$GITHUB_OUTPUT\"\n\n{\n  echo \"### Resolved APK version\"\n  echo\
        \ \"- Package: \\`$PACKAGE_NAME\\`\"\n  echo \"- Mode: \\`$VERSION_MODE\\\
        `\"\n  echo \"- Previous highest version code: \\`$max_code\\`\"\n  echo \"\
        - Next manual version name/code: \\`1.0.$((max_code + 1))\\` / \\`$((max_code\
        \ + 1))\\`\"\n  echo \"- Version name: \\`$version_name\\`\"\n  echo \"- Version\
        \ code: \\`$version_code\\`\"\n  if [ \"$VERSION_MODE\" = \"manual\" ] &&\
        \ [ \"$version_code\" -le \"$max_code\" ]; then\n    echo \"- Note: this is\
        \ an old-version rebuild, so it will not replace the latest-build pointer.\"\
        \n  fi\n} >> \"$GITHUB_STEP_SUMMARY\"\n"
